<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Corazón de Partículas</title>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial', sans-serif;
            width: 100%;
            height: 100%;
            position: fixed;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            -webkit-user-select: none;
        }

        #ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            text-align: center;
            z-index: 10;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            #ui {
                font-size: 10px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">Toca/Mueve el dedo<br>para interactuar</div>

    <script>
        // ============================================
        // DETECCIÓN DE DISPOSITIVO Y CONFIGURACIÓN
        // ============================================
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isTablet = /iPad|Android/.test(navigator.userAgent) && !/Mobile/.test(navigator.userAgent);
        const isLowEndDevice = navigator.deviceMemory && navigator.deviceMemory <= 4;
        
        // Configuración adaptativa
        let PARTICLE_COUNT = 1500;
        let ANIMATION_FPS = 60;
        let MOUSE_RADIUS = 100;
        let TOUCH_RADIUS = 40; // Radio específico para móviles reducido un 20% (50 * 0.8 = 40)
        let RETURN_SPEED = 0.05;
        let VELOCITY_LIMIT = 8;
        let HEART_SIZE = 18;

        if (isMobile) {
            if (isLowEndDevice) {
                PARTICLE_COUNT = 800;
                ANIMATION_FPS = 30;
            } else if (isTablet) {
                PARTICLE_COUNT = 1200;
                ANIMATION_FPS = 45;
            } else {
                PARTICLE_COUNT = 1000;
                ANIMATION_FPS = 45;
            }
            MOUSE_RADIUS = TOUCH_RADIUS; // Usar radio más pequeño en móviles
            RETURN_SPEED = 0.04;
        }

        const NOMBRE = "MELANIE"; // <--- CAMBIA EL NOMBRE AQUÍ
        const DURATIONS = [5000, 10000, 7000, 20000];

        // ============================================
        // GIROSCOPIO Y ORIENTACIÓN DEL DISPOSITIVO
        // ============================================
        let gyroAccess = false;
        let gyroData = { x: 0, y: 0, z: 0 };
        const GYRO_STRENGTH = 0.35; // Intensidad del efecto (0.1-0.3 recomendado)

        function requestGyroPermission() {
            if (isMobile && typeof DeviceOrientationEvent !== 'undefined') {
                // iOS 13+ requiere permiso explícito
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                gyroAccess = true;
                                setupGyroListener();
                            }
                        })
                        .catch(console.error);
                } else {
                    // Android y navegadores antiguos de iOS
                    gyroAccess = true;
                    setupGyroListener();
                }
            }
        }

        function setupGyroListener() {
            window.addEventListener('deviceorientation', e => {
                // gamma: rotación en el eje X (izquierda-derecha)
                // beta: rotación en el eje Y (adelante-atrás)
                // alpha: rotación en el eje Z (giro)
                gyroData.x = (e.gamma || 0) / 90; // Normalizar a -1 a 1
                gyroData.y = (e.beta || 0) / 90;
                gyroData.z = (e.alpha || 0) / 360;
            }, { passive: true });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: false });
        let width, height;
        let particles = [];
        let touch = { x: -1000, y: -1000 };
        
        let currentState = 0;
        let lastStateChange = Date.now();
        let lastFrameTime = 0;
        let frameDelta = 0;

        // ============================================
        // TEXTURAS PRE-RENDERIZADAS
        // ============================================
        const particleCanvas = document.createElement('canvas');
        const pCtx = particleCanvas.getContext('2d');
        const pSize = 10;
        particleCanvas.width = pSize * 2;
        particleCanvas.height = pSize * 2;

        const textureCache = new Map();

        function createParticleTexture(hue, glow = false) {
            const cacheKey = `${Math.round(hue)}-${glow}`;
            if (textureCache.has(cacheKey)) {
                return textureCache.get(cacheKey);
            }

            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            const grad = pCtx.createRadialGradient(pSize, pSize, 0, pSize, pSize, pSize);
            
            if (glow) {
                grad.addColorStop(0, `hsla(${hue}, 100%, 80%, 1)`);
                grad.addColorStop(0.3, `hsla(${hue}, 100%, 70%, 0.8)`);
                grad.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);
            } else {
                grad.addColorStop(0, `hsla(${hue}, 100%, 70%, 1)`);
                grad.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);
            }
            
            pCtx.fillStyle = grad;
            pCtx.beginPath();
            pCtx.arc(pSize, pSize, pSize, 0, Math.PI * 2);
            pCtx.fill();
            
            const img = new Image();
            img.src = particleCanvas.toDataURL();
            textureCache.set(cacheKey, img);
            return img;
        }

        // ============================================
        // CLASE PARTICLE
        // ============================================
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.destX = this.x;
                this.destY = this.y;
                this.vx = 0;
                this.vy = 0;
                this.accX = 0;
                this.accY = 0;
                this.friction = 0.95;
                this.hue = Math.random() * 40 + 330;
                this.size = Math.random() * 2 + 2;
                
                this.textureNormal = createParticleTexture(this.hue, false);
                this.textureGlow = createParticleTexture(this.hue, true);
                this.distSqThreshold = MOUSE_RADIUS * MOUSE_RADIUS;
            }

            update() {
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                this.accX = dx * RETURN_SPEED;
                this.accY = dy * RETURN_SPEED;

                // Efecto del giroscopio (solo si está disponible)
                if (gyroAccess) {
                    this.accX += gyroData.x * GYRO_STRENGTH;
                    this.accY += gyroData.y * GYRO_STRENGTH;
                }

                let mdx = this.x - touch.x;
                let mdy = this.y - touch.y;
                let mDistSq = mdx * mdx + mdy * mdy;
                
                if (mDistSq < this.distSqThreshold) {
                    let mDist = Math.sqrt(mDistSq);
                    let force = (MOUSE_RADIUS - mDist) / MOUSE_RADIUS;
                    this.accX += mdx * force * 1.2;
                    this.accY += mdy * force * 1.2;
                    this.friction = 0.88;
                } else {
                    this.friction = 0.94;
                }

                this.vx += this.accX;
                this.vy += this.accY;
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            // Escalar el corazón para que se ajuste dentro de la pantalla
            let scale = Math.min(width, height) / 600; // Reducido más para márgenes cómodos
            
            return { 
                x: x * HEART_SIZE * scale, 
                y: y * HEART_SIZE * scale 
            };
        }

        function getTextPoints(text) {
            const points = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            const fontSize = Math.min(width / (text.length * 0.6), 180);
            tempCtx.font = `bold ${fontSize}px Arial`;
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillStyle = 'white';
            tempCtx.fillText(text, width / 2, height / 2);

            const imageData = tempCtx.getImageData(0, 0, width, height).data;
            const step = Math.max(1, Math.floor(Math.sqrt((width * height) / PARTICLE_COUNT) * 0.5));
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    if (imageData[(y * width + x) * 4 + 3] > 128) {
                        points.push({ x, y });
                    }
                }
            }
            return points;
        }

        function calculateDestinations() {
            if (currentState === 0 || currentState === 2) {
                for (let i = 0; i < particles.length; i++) {
                    particles[i].destX = Math.random() * width;
                    particles[i].destY = Math.random() * height;
                }
            } else if (currentState === 1) {
                for (let i = 0; i < particles.length; i++) {
                    let t = (i / particles.length) * Math.PI * 2;
                    let pt = getHeartPoint(t);
                    particles[i].destX = pt.x + width / 2;
                    particles[i].destY = pt.y + height / 2;
                }
            } else if (currentState === 3) {
                let pts = getTextPoints(NOMBRE);
                for (let i = 0; i < particles.length; i++) {
                    let pt = pts[i % pts.length];
                    particles[i].destX = pt.x + (Math.random() - 0.5) * 2;
                    particles[i].destY = pt.y + (Math.random() - 0.5) * 2;
                }
            }
        }

        function handleInput(x, y) {
            touch.x = x;
            touch.y = y;
        }

        function resetAnimation() {
            currentState = 0;
            lastStateChange = Date.now();
            calculateDestinations();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Ajustar DPI en móviles
            if (isMobile) {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
            }
            
            // Recalcular destinos para que el corazón sea responsive
            calculateDestinations();
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Ajustar por DPI
            if (isMobile) {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
                
                // Solicitar permiso de giroscopio en iOS 13+
                requestGyroPermission();
            }

            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
            calculateDestinations();
            
            // Event listeners mejorados
            window.addEventListener('resize', resize, { passive: true });
            
            // Mouse events (desktop)
            window.addEventListener('mousemove', e => {
                handleInput(e.clientX, e.clientY);
            }, { passive: true });
            
            // Touch events (mobile)
            window.addEventListener('touchmove', e => {
                if (e.touches.length > 0) {
                    handleInput(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });
            
            // Reiniciar: doble click en desktop, single click/tap en mobile
            if (isMobile) {
                window.addEventListener('dblclick', resetAnimation, { passive: true });
            } else {
                window.addEventListener('click', resetAnimation, { passive: true });
            }
            
            animate();
        }

        // ============================================
        // LOOP DE ANIMACIÓN
        // ============================================
        let lastBlink = 0;
        let cachedBlinkValue = 1;
        let frameCounter = 0;

        function animate() {
            const now = Date.now();
            const elapsedTime = now - lastFrameTime;
            
            // Control de FPS adaptativo
            if (elapsedTime < (1000 / ANIMATION_FPS)) {
                requestAnimationFrame(animate);
                return;
            }
            
            lastFrameTime = now;

            // Fondo con rastro optimizado
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            ctx.globalAlpha = 1.0;
            
            // Control de estados
            if (now - lastStateChange > DURATIONS[currentState]) {
                currentState = (currentState + 1) % 4;
                lastStateChange = now;
                calculateDestinations();
            }

            // Cachear parpadeo
            if (currentState === 3) {
                if (now - lastBlink > 50) {
                    cachedBlinkValue = Math.sin(now * 0.01) * 0.2 + 1;
                    lastBlink = now;
                }
            }

            // Renderizar partículas
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.update();
                
                const img = (currentState === 3) ? p.textureGlow : p.textureNormal;
                const s = (currentState === 3) ? p.size * cachedBlinkValue : p.size;
                ctx.drawImage(img, p.x - s, p.y - s, s * 2, s * 2);
            }

            frameCounter++;
            requestAnimationFrame(animate);
        }

        // Iniciar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
